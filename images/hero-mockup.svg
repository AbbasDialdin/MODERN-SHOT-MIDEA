<!-- Hero Mockup Placeholder SVG -->
<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa"/>
  
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0fdf4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4C430;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00A651;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Laptop -->
  <g transform="translate(150, 100)">
    <!-- Laptop Screen -->
    <rect x="0" y="0" width="500" height="320" rx="10" fill="#2c2c2c" stroke="#1a1a1a" stroke-width="8"/>
    <rect x="15" y="15" width="470" height="285" rx="5" fill="#ffffff"/>
    
    <!-- YouTube Interface Mockup -->
    <!-- Header -->
    <rect x="15" y="15" width="470" height="40" fill="#ffffff"/>
    <rect x="25" y="25" width="80" height="20" rx="3" fill="#FF0000"/>
    <text x="35" y="40" font-family="Arial" font-size="14" font-weight="bold" fill="white">YouTube</text>
    
    <!-- Video Player -->
    <rect x="25" y="65" width="320" height="180" rx="8" fill="url(#screenGrad)"/>
    
    <!-- Play Button -->
    <circle cx="185" cy="155" r="35" fill="rgba(255,0,0,0.9)"/>
    <polygon points="175,145 175,165 195,155" fill="white"/>
    
    <!-- Video Title -->
    <rect x="25" y="255" width="250" height="12" rx="3" fill="#e0e0e0"/>
    <rect x="25" y="275" width="180" height="10" rx="3" fill="#f0f0f0"/>
    
    <!-- Sidebar -->
    <rect x="355" y="65" width="115" height="80" rx="5" fill="#f8f9fa"/>
    <rect x="365" y="75" width="95" height="55" rx="3" fill="url(#screenGrad)"/>
    <rect x="365" y="135" width="95" height="8" rx="2" fill="#e0e0e0"/>
    
    <rect x="355" y="155" width="115" height="80" rx="5" fill="#f8f9fa"/>
    <rect x="365" y="165" width="95" height="55" rx="3" fill="url(#screenGrad)"/>
    <rect x="365" y="225" width="95" height="8" rx="2" fill="#e0e0e0"/>
    
    <!-- Laptop Base -->
    <rect x="-20" y="320" width="540" height="15" rx="5" fill="#4a4a4a"/>
    <rect x="180" y="335" width="140" height="5" rx="2" fill="#3a3a3a"/>
  </g>
  
  <!-- Camera Icon -->
  <g transform="translate(80, 350)">
    <circle cx="0" cy="0" r="50" fill="#00A651" opacity="0.2"/>
    <circle cx="0" cy="0" r="35" fill="#00A651"/>
    <!-- Camera body -->
    <rect x="-15" y="-8" width="30" height="20" rx="3" fill="white"/>
    <circle cx="0" cy="2" r="8" fill="white" opacity="0.3"/>
    <rect x="10" y="-12" width="5" height="5" rx="1" fill="white"/>
  </g>
  
  <!-- YouTube Icon -->
  <g transform="translate(720, 150)">
    <circle cx="0" cy="0" r="50" fill="#FF0000" opacity="0.2"/>
    <circle cx="0" cy="0" r="35" fill="#FF0000"/>
    <polygon points="-10,-8 -10,8 10,0" fill="white"/>
  </g>
  
  <!-- Upload Icon -->
  <g transform="translate(650, 480)">
    <circle cx="0" cy="0" r="40" fill="#F4C430" opacity="0.2"/>
    <circle cx="0" cy="0" r="28" fill="#F4C430"/>
    <!-- Upload arrow -->
    <polygon points="0,-12 -8,0 -3,0 -3,10 3,10 3,0 8,0" fill="white"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="100" cy="120" r="8" fill="#F4C430" opacity="0.3"/>
  <circle cx="680" cy="380" r="12" fill="#00A651" opacity="0.3"/>
  <circle cx="150" cy="520" r="6" fill="#FF0000" opacity="0.3"/>
</svg>
