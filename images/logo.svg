<!-- Placeholder SVG for Logo -->
<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient)" />
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F4C430;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A651;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Camera Icon -->
  <g transform="translate(50, 50)">
    <!-- Camera Body -->
    <rect x="20" y="40" width="60" height="45" rx="5" fill="white" opacity="0.9"/>
    <circle cx="50" cy="62" r="15" fill="white" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="50" cy="62" r="10" fill="#1a1a1a"/>
    
    <!-- Camera Lens -->
    <circle cx="50" cy="62" r="6" fill="white" opacity="0.3"/>
    
    <!-- Camera Flash -->
    <rect x="65" y="35" width="8" height="8" rx="2" fill="white"/>
    
    <!-- Play Button -->
    <polygon points="30,90 30,110 48,100" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Text MSM -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">MSM</text>
</svg>
